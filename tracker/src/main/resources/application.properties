spring.application.name=tracker

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/investment_tracker
spring.datasource.username=changeme
spring.datasource.password=changeme

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.security=DEBUG

spring.app.jwtSecret=changeme
spring.app.jwtExpirationMs=172800000

spring.profiles.active=local

